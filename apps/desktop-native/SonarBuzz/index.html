<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tauri + React + Typescript</title>
    <script>
      function showError(msg) {
        var container = document.body || document.documentElement;
        if (container) {
          var div = document.getElementById('debug-error-banner');
          if (!div) {
            div = document.createElement('div');
            div.id = 'debug-error-banner';
            div.style.color = 'red';
            div.style.padding = '20px';
            div.style.background = '#fee';
            div.style.border = '1px solid red';
            div.style.position = 'fixed';
            div.style.top = '0';
            div.style.left = '0';
            div.style.right = '0';
            div.style.zIndex = '9999';
            div.style.fontFamily = 'monospace';
            div.style.whiteSpace = 'pre-wrap';
            container.appendChild(div);
          }
          div.innerText = msg;
        } else {
          setTimeout(function() { showError(msg); }, 100);
        }
      }
      window.addEventListener('error', function(event) {
        showError('Runtime Error:\n' + event.message + '\nat ' + event.filename + ':' + event.lineno + ':' + event.colno + '\n\nStack:\n' + (event.error ? event.error.stack : 'No stack trace'));
      });
      window.addEventListener('unhandledrejection', function(event) {
        showError('Unhandled Rejection:\n' + (event.reason ? (event.reason.stack || event.reason.message || event.reason) : 'unknown'));
      });
    </script>
    <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
